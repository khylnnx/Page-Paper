<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Scroll Owner Book Memories</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow-x: hidden;
            background-color: #EAE2C6;
        }

        section {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 8px;
            padding: 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: #bbb #f9f9f9;
            scroll-behavior: smooth;
            box-sizing: border-box;
        }

        /* Scrollable section for images only */
        section {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 8px;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #bbb #f9f9f9;
            scroll-behavior: smooth;
            box-sizing: border-box;
        }

        section::-webkit-scrollbar {
            height: 8px;
        }

        section::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 10px;
        }

        img {
            width: 260px;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
